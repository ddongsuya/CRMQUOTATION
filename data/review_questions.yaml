    domain_context: |
      AD-001과 AD-003은 모두 "유전독성 복귀돌연변이 재현시험 +2,000,000원"으로 가격이
      동일합니다. 트리거만 다릅니다.
        - AD-001: 의약품·건기식 - "필요 시 자발적 재현"
        - AD-003: 화장품 - "양성 판정 시 강제 재현"
    questions_for_reviewer:
      - "실제 영업에서 두 케이스를 구분하시나요, 아니면 둘 다 \"재현시험 200만원\"으로 동일 처리하시나요?"
      - "통합한다면 트리거를 어떻게 잡을까요? (예: 양성판정 시 강제 + 의뢰자 요청 시 자발적, 두 트리거 모두 가능)"
      - "양성판정 강제 케이스에서 의뢰자가 거부하면 어떻게 되나요?"
    suggested_rule_format: |
      만약 "통합"이라면:
        AD-001을 다음 트리거로 확장:
          trigger_keys: ["voluntary_recheck", "primary_result_positive"]
          mandatory_when: ["primary_result_positive"]
        AD-003 deprecate
    impact_if_undefined: |
      두 룰 유지 — 큰 문제 없으나 향후 룰 정비 시 통합 검토 필요.
    related_existing_rules: ["AD-001", "AD-003"]
