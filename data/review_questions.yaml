  - id: Q-020
    related_rule_id_proposal: "(CG-003·CG-004 보강)"
    priority: "보통 (P2)"
    question_summary: "의료기기 인체 노출 기간 임계값(아급성/아만성), 흡수성 판정 기준?"
    domain_context: |
      CG-003은 "인체 노출 기간에 따라 아급성/아만성 시험 선택", CG-004는 "흡수성/비흡수성에
      따라 부검 포인트 변경" 룰. 임계값과 판정 기준이 명시 안 됨 (ISO 10993-1 기준
      추정).
    questions_for_reviewer:
      - "인체 노출 24h 미만 = 단기, 24h~30일 = 중기, 30일 초과 = 장기 — 이게 ISO 기준이고 켐온도 따르나요?"
      - "고객이 \"우리 제품은 30일 이상 인체 접촉\"이라고 신청서에 적으면 자동으로 아만성 시험으로 분류되나요?"
      - "흡수성 판정은 고객 자료(생분해성 데이터)로 하나요, 켐온이 별도 시험으로 확인하나요?"
    suggested_rule_format: |
      conditional_groups:
        - id: CG-003    # 보강
          selection_thresholds:
            short_term: "<24h"
            medium_term: "24h-30days"
            long_term: ">30days"
            mapping:
              short_term: "아급성"
              medium_term: "아급성"
              long_term: "아만성"
    impact_if_undefined: |
      의료기기 시험 자동 선택 불가 — 영업이 수기 판단.
    related_existing_rules: ["CG-003", "CG-004"]
    answer_summary: null


