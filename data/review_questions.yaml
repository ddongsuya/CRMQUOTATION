# ─────────────────────────────────────────────────────────────────────────────
# 견적 자동 생성 룰 카탈로그 — 검토용 메타 질문 모음 v1.0
# 출처: rules_catalog.yaml v1.1의 review_notes에서 발견된 모호함 +
#       extraction_log.md §5 "도메인 상식상 있어야 할 룰"
# 작성일: 2026-05-14
# 검토 대상: 센터장, 팀장
#
# 본 파일의 목적:
#   각 질문은 룰 카탈로그에서 채워져야 하나 자료에 명시되지 않은 정보입니다.
#   답변 후 새 룰을 카탈로그에 추가하거나 기존 룰의 review_notes를 보강합니다.
#
# 우선순위:
#   필수 (P0): 시스템이 이 질문 답 없이는 진입 불가
#   중요 (P1): 답 없으면 견적 자동 생성에서 영업 수기 개입 필요
#   보통 (P2): 답 없어도 동작은 가능, 정확도/세부사항 영향
#
# 답변 시 작성 항목:
#   answer_summary       — 한 줄 답
#   answer_detail        — 상세
#   resulting_rule_id    — 답변으로 생성된 룰 ID (있으면)
#   answered_by          — 답변자
#   answered_at          — 답변 일시
# ─────────────────────────────────────────────────────────────────────────────

review_questions:

  # ══════════════════════════════════════════════════════════════════════════
  # 필수 (P0) — 시스템 진입 불가 수준의 빈 칸
  # ══════════════════════════════════════════════════════════════════════════

  - id: Q-001
    related_rule_id_proposal: "MR-001"
    priority: "필수 (P0)"
    question_summary: "MFDS / OECD 시트 자동 선택 룰이 존재하는가?"
    domain_context: |
      현재 의약품 견적서는 4개 시트(MFDS·OECD × 경구피하근육·정맥경피)로
      나뉘어 있습니다. 견적 자동 생성 시스템은 고객이 입력한 정보로부터
      어느 시트를 사용할지 자동 선택해야 합니다.
    questions_for_reviewer:
      - "고객이 견적 의뢰서에 '국내 식약처 IND 제출용'이라고 적으면 MFDS 시트 가격으로 자동 산출되나요?"
      - "고객이 'FDA IND 제출용'이라고 적으면 OECD 시트 가격으로 자동 산출되나요?"
      - "국내 + USFDA 동시 제출인 경우 두 가격을 모두 보여주나요, 아니면 더 비싼 쪽으로 합치나요?"
      - "EMA(유럽), PMDA(일본) 신청 시는 MFDS·OECD 중 어느 쪽을 쓰나요?"
    suggested_rule_format: |
      만약 답변이 "예, 국가별 매핑 있음"이라면:

      generic_rules:
        - id: MR-001
          rule_type: submission_country_mapping
          parameters:
            mappings:
              - submission_target: "국내 / MFDS"
                use_standard: "MFDS"
              - submission_target: "USFDA"
                use_standard: "OECD"
              - submission_target: "EMA"
                use_standard: "OECD"
              - submission_target: "PMDA"
                use_standard: "OECD"
            multi_country_policy: "show_both" | "use_max"
    impact_if_undefined: |
      엔진이 시트조차 선택 못함. 사실상 견적 생성 진입 불가.
      현재 임시 대응: 영업이 수기로 시트 선택 후 가격 복사.
    related_existing_rules: []
    answer_summary: null
    answer_detail: null
    answered_by: null
    answered_at: null


  - id: Q-002
    related_rule_id_proposal: "GR-004"
    priority: "필수 (P0)"
    question_summary: "GLP 시험은 non-GLP 대비 단가 가산율이 정해져 있는가?"
    domain_context: |
      심혈관계 스크리닝 견적서에 "안전성약리 시험: in vitro 심혈관계 시험 (GLP)"
      (test_no=4)이 별도로 등록되어 있고, non-GLP 동일 시험들 대비 가격이 매우
      높습니다 (40,000,000원 vs 3,000,000원, 13배 이상 차이).
      다른 견적서(의약품 등)에서는 GLP/non-GLP 표기가 일관되지 않아, GLP 가산이
      별도 룰로 존재하는지 불명확합니다.
    questions_for_reviewer:
      - "고객이 GLP 신청서를 가져오면 단가가 자동으로 +X% 되나요? (현재 의약품 견적서는 모두 GLP 가정인가요?)"
      - "심혈관계 GLP 시험의 13배 가격차는 단순 GLP 가산이 아니라 시험 설계 자체가 다른 건가요?"
      - "non-GLP 견적이라면 가격을 자동으로 -Y% 적용하면 되나요?"
    suggested_rule_format: |
      만약 답변이 "예, 가산율 있음"이라면:

      generic_rules:
        - id: GR-004
          rule_type: glp_premium_rate
          parameters:
            default_assumption: "GLP"   # 모든 견적서 단가는 GLP 기준
            non_glp_discount_rate: 0.4  # non-GLP 신청 시 -40%
            file_type_specific:
              cardiovascular_screening:
                glp_discount_skipped: true   # 별도 시험 항목으로 등록됨
    impact_if_undefined: |
      GLP/non-GLP 신청에 따른 자동 가격 조정 불가. 영업이 수기 산출.
    related_existing_rules: ["(없음)"]
    answer_summary: null


  - id: Q-003
    related_rule_id_proposal: "PF-004"
    priority: "필수 (P0)"
    question_summary: "조제물 분석 가격 산출 공식이 따로 있는가? (현재 모든 견적서에 가격 비어있음)"
    domain_context: |
      모든 견적서의 test_no=1 "투여물질의 조제물 분석"은 가격이 비어 있고
      duration_weeks="6~"로만 표시됩니다. 견적서에 "<견적 시마다 계산하여
      수정할 것>"이라고 명시.
      복합제 견적서만 예외적으로 가격이 있고 (2종=20M / 3종=30M / 4종=40M),
      이는 PF-002로 캡처했습니다.
      복합제 외 일반 견적의 경우, 가격 산출 변수가 무엇인지 명시되어 있지 않습니다.
    questions_for_reviewer:
      - "조제물 분석 가격 산출 시 어떤 정보가 필요한가요? (예: 검체 수, 분석법 종류, 분석 횟수)"
      - "표준 단가표가 있나요? 예) HPLC 1회 분석 = X원, 균질성 검사 1회 = Y원"
      - "혹시 영업 사용 산출 엑셀이 따로 있나요? (조직병리 계산식 같은)"
    suggested_rule_format: |
      만약 답변이 "예, 단가표 있음"이라면:

      pricing_formulas:
        - id: PF-004
          formula: "validation_count * 5000000 + sample_analysis_count * analysis_unit_price"
          variables:
            - name: validation_count
              source: "견적 입력"
            - name: sample_analysis_count
              source: "견적 입력"
            - name: analysis_unit_price
              source: "분석법별 단가표 (HPLC/LC-MS/MS 등)"
    impact_if_undefined: |
      모든 견적의 조제물 분석 항목이 빈 가격으로 출력됨. 영업이 매번 수기 산출.
    related_existing_rules: ["PF-002 (복합제 조제물 분석 — 선형 패턴만 캡처됨)"]
    answer_summary: null


  # ══════════════════════════════════════════════════════════════════════════
  # 중요 (P1) — 자동 생성 가능하지만 정확도/완성도 큰 영향
  # ══════════════════════════════════════════════════════════════════════════

  - id: Q-004
    related_rule_id_proposal: "AD-009 (보강)"
    priority: "중요 (P1)"
    question_summary: "번역보고서(국문→영문) 추가 비용 단가표가 있는가?"
    domain_context: |
      모든 견적서 footer에 "번역보고서 작성시 비용이 추가됩니다" 명시.
      SEND/CTD/번역 견적서에 "설치류 단회 영문보고서 작성 = 1,000,000원" 등 일부 단가가 있습니다.
      그러나 모든 시험 종류에 대한 완전한 단가표가 어디 있는지, 일반 견적서의
      어떤 시험이 어느 번역 단가에 매핑되는지 명시 안 됨.
    questions_for_reviewer:
      - "고객이 의약품 13주 반복독성시험 견적을 받았을 때, 영문보고서 옵션을 추가하려면 어디서 단가를 가져오나요?"
      - "단회 영문보고서 100만 / 반복 영문보고서 200만 같은 식으로 단가가 정해져 있나요?"
      - "(번역비용) 견적서에 등록된 단가표가 모든 시험에 보편적으로 매핑되나요?"
    suggested_rule_format: |
      만약 답변이 "단가표 있음"이라면:

      addons:
        - id: AD-009    # 보강 (priceKrwTable 채움)
          price_krw_table:
            - test_type_ko: "단회 시험 영문보고서"
              price_krw: 1000000
            - test_type_ko: "반복 시험 영문보고서"
              price_krw: 2500000
            # ... (시험 카테고리별 모든 단가)
    impact_if_undefined: |
      영문보고서 옵션 가격이 견적에 자동 산출 안 됨. 영업이 수기로 SEND/CTD/번역 견적서 단가를 찾아 적용.
    related_existing_rules: ["AD-009 (footer 명시만 캡처, 단가표 미연결)"]
    answer_summary: null


  - id: Q-005
    related_rule_id_proposal: "PR-009"
    priority: "중요 (P1)"
    question_summary: "랫드 발암성시험에도 마우스(PR-001)와 같은 선행 시험 룰이 적용되는가?"
    domain_context: |
      PR-001은 마우스 발암성시험에 4주 DRF + 13주 반복독성시험을 자동 추가하도록
      명시되어 있습니다. 그러나 랫드 발암성시험(test_no=98)에는 동일한 명시가 없습니다.
      도메인 상식상 랫드 발암성에도 선행 시험이 필요할 것으로 추정됩니다.
    questions_for_reviewer:
      - "랫드 발암성시험을 신청하면 4주 DRF, 13주 반복독성도 자동으로 견적에 포함되어야 하나요?"
      - "랫드와 마우스의 선행 시험 요구사항이 다른가요? (예: 랫드는 26주 반복독성도 필요?)"
      - "이미 의뢰자가 랫드 13주 반복독성 자료를 가지고 있다면 견적에서 빼주나요?"
    suggested_rule_format: |
      만약 "예"라면:

      prerequisite_rules:
        - id: PR-009
          trigger:
            test_name_contains: "발암성시험"
            test_subcategory_contains: "랫드"
          prerequisites:
            - test_name_pattern: "설치류 4주 투여 DRF 시험"
              species_filter: "랫드 (SD rat)"
              mandatory: true
            - test_name_pattern: "설치류 13주 반복 투여 독성시험"
              species_filter: "랫드 (SD rat)"
              mandatory: true
    impact_if_undefined: |
      랫드 발암성 견적이 단독으로 산출 — 영업이 수기로 DRF·13주 추가.
    related_existing_rules: ["PR-001 (마우스 한정)"]
    answer_summary: null


  - id: Q-006
    related_rule_id_proposal: "AD-006 (보강)"
    priority: "중요 (P1)"
    question_summary: "SEND/CTD/번역 - 회복군·TK 추가 단가표가 어디 있는가?"
    domain_context: |
      AD-006은 "(회복군 및 TK 포함경우 별도 추가)"를 룰로 캡처했지만, 추가 단가가
      명시 안 됨. 번역 견적서에는 "아래금액으로 별도 추가"라는 표현이 있어 별도 단가표가
      존재하는 것으로 보이지만 자료에서 찾지 못했습니다.
    questions_for_reviewer:
      - "회복군 SEND 변환 추가 단가가 정해져 있나요? (예: 일괄 5,000,000원, 또는 시험 카테고리별?)"
      - "TK 포함 추가는 회복군과 같은 단가인가요, 다른가요?"
      - "추가 단가표가 별도 문서로 있다면 첨부 가능한가요?"
    suggested_rule_format: |
      만약 단가표 있음:

      addons:
        - id: AD-006    # 보강
          price_krw_table:
            - service: "SEND - 회복군 추가"
              price_krw: 5000000
            - service: "SEND - TK 추가"
              price_krw: 5000000
            - service: "CTD - 회복군+TK 추가"
              price_krw: 1000000
            # ...
    impact_if_undefined: |
      SEND·CTD 견적에서 회복군·TK 옵션이 추가됐을 때 가격 자동 산출 불가.
    related_existing_rules: ["AD-006 (footer 명시만 캡처)"]
    answer_summary: null


  - id: Q-007
    related_rule_id_proposal: "CG-002 (보강)"
    priority: "중요 (P1)"
    question_summary: "생식독성 TK 태반이행 - 임신동물 추가 마리당 단가가 있는가?"
    domain_context: |
      CG-002 룰은 "투여일이 매일 투여가 아닐 경우 군당 임신동물 3마리 추가"로 명시되어
      있지만, 추가 동물의 단가가 별도 명시 안 됨. 1군당 3마리 × 시험군·대조군 4군 =
      12마리 추가의 가격 영향이 어떻게 산출되는지 불명확합니다.
    questions_for_reviewer:
      - "임신 SD rat 1마리 추가 시 단가가 정해져 있나요?"
      - "이 추가가 시험 가격(test_no=84/87)에 비례 가산되나요, 별도 항목으로 잡히나요?"
      - "Rat과 Rabbit의 단가가 다른가요?"
    suggested_rule_format: |
      pregnant_animal_unit_prices:
        SD_rat: X    # 원/마리
        Rabbit: Y
    impact_if_undefined: |
      태반이행 시험 견적에서 매일 투여 아닌 케이스 가격 산출 불가.
    related_existing_rules: ["CG-002"]
    answer_summary: null


  - id: Q-008
    related_rule_id_proposal: "AD-002 (보강)"
    priority: "중요 (P1)"
    question_summary: "건기식 13주 반복독성 - 성호르몬 측정 4종 단가가 있는가?"
    domain_context: |
      AD-002 룰은 "성호르몬 측정 추가 비용 발생"으로만 명시. 단가 없음.
      성호르몬 4종(testosterone, oestradiol, FSH, LH) 측정의 표준 단가가 있는지 불명확.
    questions_for_reviewer:
      - "성호르몬 4종 측정 가격이 시험당 정해져 있나요? (예: 1군당 X원, 또는 마리당 X원)"
      - "검체 수에 비례하나요, 정액인가요?"
      - "이 룰이 의약품 13주 반복독성에도 적용되나요? (현재 자료에는 건기식만 명시)"
    suggested_rule_format: |
      addons:
        - id: AD-002    # 보강
          price_krw: X       # 시험당 정액인 경우
          # 또는
          price_per_unit: Y  # 마리당 또는 검체당
          unit: "per_animal" | "per_sample"
    impact_if_undefined: |
      건기식 13주 견적에 성호르몬 옵션 가격 자동 산출 불가.
    related_existing_rules: ["AD-002"]
    answer_summary: null


  - id: Q-009
    related_rule_id_proposal: "(GR-001 보강)"
    priority: "중요 (P1)"
    question_summary: "견적 60일 만료 시 시스템 동작 — 자동 무효화 vs 알림만?"
    domain_context: |
      GR-001은 "견적서 60일 유효" 룰로 추출됐습니다. CRM이 만료된 견적을 어떻게
      처리할지 정책이 필요합니다.
    questions_for_reviewer:
      - "견적 60일 후, 시스템이 자동으로 견적을 무효화하고 새 견적을 발행해야 하나요? 아니면 알림만 보내고 영업이 수동 갱신하나요?"
      - "만료된 견적으로 시험이 진행되지 않도록 차단해야 하나요? (영업이 부주의로 만료 견적 사용 방지)"
      - "갱신 시 단가가 변경됐다면 재산정인가요, 원래 단가 유지인가요? (60일 안에 단가 인상이 있을 수 있음)"
    suggested_rule_format: |
      generic_rules:
        - id: GR-001    # 보강
          parameters:
            validity_days: 60
            on_expiry_action: "auto_invalidate" | "notify_only"
            allow_extension: true | false
            renewal_recalculate: true | false
    impact_if_undefined: |
      만료 견적 처리 정책 부재 → 영업 사고 위험 (만료 견적으로 시험 진행).
    related_existing_rules: ["GR-001"]
    answer_summary: null


  - id: Q-010
    related_rule_id_proposal: "(PR-007 보강)"
    priority: "중요 (P1)"
    question_summary: "시험물질 멸균 검수 미통과 시 견적 진행 기간(duration_weeks) 자동 연장?"
    domain_context: |
      PR-007 룰은 "미생물 검출 시 모든 물질 반환 → 멸균처리 → 재제공"으로 명시.
      재공급에 따른 일정 지연이 견적의 duration_weeks에 어떻게 반영되는지 불명확.
    questions_for_reviewer:
      - "검수 실패로 시험물질이 반환되면 시험 시작이 늦춰지는데, duration_weeks에 자동으로 며칠/몇 주가 더해지나요?"
      - "재제공까지 소요되는 표준 기간이 있나요? (예: 평균 2주 가산)"
      - "이 지연이 견적 60일 유효기간(GR-001)에 영향 미치나요?"
    suggested_rule_format: |
      prerequisite_rules:
        - id: PR-007    # 보강
          on_failure_lead_time_weeks: 2
          extends_quote_validity: true | false
    impact_if_undefined: |
      검수 실패 시 일정 자동 갱신 안 됨. 영업이 수기 조정.
    related_existing_rules: ["PR-007", "GR-001", "GR-003"]
    answer_summary: null


